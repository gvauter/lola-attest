name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install ampel
        run: go install github.com/carabiner-dev/ampel/cmd/ampel@latest

      - name: Run tests
        run: go test ./... -v
